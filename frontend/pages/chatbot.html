<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PhishGuard — Security Chat</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <style>
    /* ── Chat layout ────────────────────────────────────────── */
    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--topbar-h) - 4rem);
      max-width: 800px;
    }

    /* ── Topic chips ─────────────────────────────────────────── */
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: .6rem;
      margin-bottom: 1.25rem;
    }
    .topic-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .6rem .9rem;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
    }
    .topic-chip:hover {
      border-color: var(--accent);
      background: var(--surface);
    }
    .topic-chip .chip-icon { font-size: 1.1rem; display: block; margin-bottom: .25rem; }
    .topic-chip .chip-label {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--text);
      display: block;
    }
    .topic-chip .chip-hint {
      font-size: .68rem;
      color: var(--text-dim);
      margin-top: .15rem;
      display: block;
    }

    /* ── Messages area ──────────────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      display: flex;
      gap: .75rem;
      animation: fadeIn .2s ease;
    }
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      flex-shrink: 0;
    }
    .msg.bot  .msg-avatar { background: var(--accent); color: #000; }
    .msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }
    .msg.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 75%;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .85rem;
      line-height: 1.65;
    }
    .msg.bot  .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: #000;
      font-weight: 500;
    }
    .msg-time {
      font-family: var(--font-mono);
      font-size: .65rem;
      color: var(--text-muted);
      margin-top: .3rem;
    }

    /* ── Input bar ──────────────────────────────────────────── */
    .chat-input-bar {
      display: flex;
      gap: .75rem;
      padding-top: .75rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: .88rem;
      padding: .65rem 1rem;
      resize: none;
      outline: none;
      transition: border-color .15s;
    }
    .chat-input:focus { border-color: var(--accent); }

    /* ── Suggested follow-ups ───────────────────────────────── */
    .followups {
      display: flex; flex-wrap: wrap; gap: .4rem;
      margin-top: .75rem;
      padding-top: .6rem;
      border-top: 1px solid var(--border);
    }
    .followups-label {
      width: 100%;
      font-family: var(--font-mono);
      font-size: .62rem;
      color: var(--text-muted);
      margin-bottom: .25rem;
      letter-spacing: .05em;
    }
    .followup-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: .67rem;
      padding: .2rem .6rem;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
    }
    .followup-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      border-style: solid;
    }

    /* ── Typing indicator ───────────────────────────────────── */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      margin: 0 2px;
      animation: bounce .9s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="topbar-logo" href="/dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>Phish<span>Guard</span>
  </a>
  <div class="topbar-right">
    <span class="model-status"><span class="status-dot"></span>MODEL ONLINE</span>
    <span class="user-badge">Signed in as <b id="topbar-username">—</b></span>
    <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="nav-section">
    <div class="nav-label">Main</div>
    <a class="nav-item" href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item" href="/detect"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Detect Email</a>
    <a class="nav-item active" href="/chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Security Chat</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-header" style="margin-bottom:1rem;">
    <div>
      <h2>Security Assistant</h2>
      <p class="text-mono text-sm text-dim">Ask anything about phishing, email security, and safe practices</p>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="clearChat()">Clear chat</button>
  </div>

  <!-- Topic chips — shown before first message -->
  <div id="topic-section">
    <p class="text-dim text-sm" style="margin-bottom:.75rem;font-family:var(--font-mono);">
      ▸ Click a topic to get started, or type your own question below
    </p>
    <!-- Chips are loaded dynamically from /api/chat/topics
         so they always stay in sync with the backend knowledge base.
         Adding a new topic to chatbot.py auto-adds it here. -->
    <div class="topic-grid" id="topic-grid">
      <div class="text-dim text-sm text-mono" style="grid-column:1/-1;">Loading topics…</div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-wrapper">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <textarea class="chat-input" id="chat-input" rows="1"
        placeholder="Type a security question…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="btn btn-primary" onclick="sendMessage()" id="send-btn">Send</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script>
  Auth.requireAuth();
  Utils.setupTopbar();

  // ── State ─────────────────────────────────────────────────
  // Track which topics have already been covered so we never
  // suggest a follow-up about something already answered.
  const _discussed = new Set();
  let   _isWaiting  = false;  // prevents double-send while API call in flight
  let   _depth      = 0;      // tracks conversation depth
                               // topic chips = depth 0, follow-ups = depth 1
                               // no follow-ups shown after depth 1

  // ── Follow-up map ─────────────────────────────────────────
  // Keys match words in the USER'S question only (not the reply).
  // Each value is a list of distinct follow-on questions.
  // Once a key is in _discussed it won't be suggested again.
  const FOLLOWUPS = {
    'what is phishing':   ['How do I spot a phishing email?', 'What is spear phishing?'],
    'spot':               ['Are email attachments dangerous?', 'What if I already clicked a link?'],
    'link':               ['What file types are dangerous?', 'How do I report phishing?'],
    'report':             ['What happens after I report it?', 'How do I create a strong password?'],
    'password':           ['What is two-factor authentication?', 'Should I use a password manager?'],
    '2fa':                ['Which 2FA app should I use?', 'Is SMS two-factor authentication safe?'],
    'spear':              ['Can AI be used to create phishing emails?', 'How do I spot spear phishing?'],
    'attachment':         ['What file extensions should I never open?', 'Are PDFs safe to open?'],
    'sms':                ['What is vishing?', 'How do I verify an unknown caller?'],
    'clicked':            ['Should I change all my passwords now?', 'How do I check for malware?'],
    'vishing':            ['What is smishing?', 'How do companies protect against phone scams?'],
    'malware':            ['What is ransomware?', 'How do I remove malware?'],
  };

  // Pick follow-ups based on USER question only, skip already discussed
  function getFollowups(userQuestion) {
    const lower = userQuestion.toLowerCase();

    for (const [key, suggestions] of Object.entries(FOLLOWUPS)) {
      if (lower.includes(key) && !_discussed.has(key)) {
        _discussed.add(key);
        // Filter out suggestions that have already been discussed
        return suggestions.filter(s =>
          !Array.from(_discussed).some(d => s.toLowerCase().includes(d))
        ).slice(0, 2); // max 2 follow-ups to avoid overwhelming
      }
    }
    // Generic follow-ups only if nothing specific matched
    return ['How do I protect myself?', 'What should I do if I get a phishing email?']
      .filter(s => !_discussed.has(s.toLowerCase()))
      .slice(0, 1);
  }

  // ── Time helper ───────────────────────────────────────────
  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Textarea auto-resize ──────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── Enter key sends (Shift+Enter for newline) ─────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Scroll to bottom of messages ─────────────────────────
  function scrollBottom() {
    const el = document.getElementById('chat-messages');
    el.scrollTop = el.scrollHeight;
  }

  // ── Hide topic chips after first interaction ──────────────
  function hideTopics() {
    const sec = document.getElementById('topic-section');
    if (sec) sec.style.display = 'none';
  }

  // ── Render a message bubble ───────────────────────────────
  // CONCEPT: createElement vs innerHTML
  // We use createElement here (not innerHTML on the parent)
  // so existing messages aren't re-rendered and don't lose
  // their event listeners.
  function appendMessage(role, text, followups = []) {
    const el    = document.getElementById('chat-messages');
    const isBot = role === 'bot';

    // Build follow-up buttons as real DOM elements so we
    // control exactly what onclick does — no inline HTML string
    // that could accidentally double-fire.
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const bubbleContent = document.createElement('div');
    bubbleContent.className = 'msg-bubble';
    bubbleContent.innerHTML = text.replace(/\n/g, '<br>');

    // Only add follow-ups to bot messages, and only if there are any
    if (isBot && followups.length > 0) {
      const followupDiv = document.createElement('div');
      followupDiv.className = 'followups';

      // Label so user knows these are suggestions, not auto-actions
      const label = document.createElement('div');
      label.className   = 'followups-label';
      label.textContent = '💡 You might also ask:';
      followupDiv.appendChild(label);

      followups.forEach(f => {
        const btn = document.createElement('button');
        btn.className   = 'followup-btn';
        btn.textContent = f;
        // Use a closure to capture f — avoids stale reference bugs
        btn.addEventListener('click', () => sendFollowup(f));
        followupDiv.appendChild(btn);
      });

      bubbleContent.appendChild(followupDiv);
    }

    div.innerHTML = `<div class="msg-avatar">${isBot ? '🛡' : '👤'}</div><div></div>`;
    div.lastChild.appendChild(bubbleContent);

    const timeDiv = document.createElement('div');
    timeDiv.className   = 'msg-time';
    timeDiv.textContent = now();
    div.lastChild.appendChild(timeDiv);

    el.appendChild(div);
    scrollBottom();
  }

  // ── Typing indicator ──────────────────────────────────────
  function showTyping() {
    const el  = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-avatar">🛡</div>
      <div>
        <div class="msg-bubble">
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>`;
    el.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Follow-up chip clicked ────────────────────────────────
  // Separate function from ask() so topic chips and follow-up
  // chips behave slightly differently.
  // Topic chips: hide the grid, then send
  // Follow-up chips: grid already hidden, just send
  function sendFollowup(question) {
    if (_isWaiting) return;
    _depth = 1; // mark that we are now in a follow-up — no more chains
    const input = document.getElementById('chat-input');
    input.value = question;
    sendMessage();
  }

  // ── Topic chip clicked ────────────────────────────────────
  function ask(question) {
    if (_isWaiting) return;
    _depth = 0; // fresh topic — allow one level of follow-ups
    hideTopics();
    const input = document.getElementById('chat-input');
    input.value = question;
    sendMessage();
  }

  // ── Core send function ────────────────────────────────────
  async function sendMessage() {
    if (_isWaiting) return;

    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;

    // If user typed manually (not via chip/followup), reset depth
    // so they get follow-up suggestions again
    if (_depth !== 1) _depth = 0;

    // Lock UI immediately
    _isWaiting = true;
    const btn  = document.getElementById('send-btn');
    btn.disabled    = true;
    btn.textContent = '…';

    hideTopics();
    appendMessage('user', text);
    input.value       = '';
    input.style.height = 'auto';
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${Auth.getToken()}`,
        },
        body: JSON.stringify({ message: text }),
      }).then(r => r.json());

      removeTyping();

      if (res.status === 'success') {
        const reply = res.data.reply || res.data.message || 'No response.';
        // Only show follow-ups for top-level questions (depth 0).
        // When a follow-up button is clicked (_depth === 1),
        // the response is clean with no further chain.
        const followups = _depth === 0 ? getFollowups(text) : [];
        appendMessage('bot', reply, followups);
      } else {
        appendMessage('bot', '⚠️ Sorry, I could not process that. Please try again.');
      }

    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠️ Connection error. Make sure the server is running.');
    }

    // Unlock UI
    _isWaiting      = false;
    btn.disabled    = false;
    btn.textContent = 'Send';
    input.focus();
  }

  // ── Clear chat ────────────────────────────────────────────
  function clearChat() {
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('topic-section').style.display = 'block';
    _discussed.clear();
    _isWaiting = false;
    _depth     = 0;
    loadTopics();
  }

  // ── Load topic chips from backend ────────────────────────
  // CONCEPT: Dynamic UI generation
  // Instead of hardcoding chips in HTML, we fetch them from
  // the API. This means adding a topic to chatbot.py
  // automatically adds a chip — no HTML editing needed.
  const CHIP_ICONS = {
    'phishing':     '🎣',
    'spot':         '🔍',
    'link':         '🔗',
    'clicked':      '🚨',
    'spear':        '🎯',
    'password':     '🔑',
    '2fa':          '🔐',
    'sms':          '📱',
    'report':       '📋',
    'attachment':   '📎',
    'social':       '🧠',
    'breach':       '💥',
    'malware':      '🦠',
    'wifi':         '📶',
    'privacy':      '🔏',
  };

  function getIcon(label) {
    const lower = label.toLowerCase();
    for (const [key, icon] of Object.entries(CHIP_ICONS)) {
      if (lower.includes(key)) return icon;
    }
    return '🛡';
  }

  async function loadTopics() {
    const grid = document.getElementById('topic-grid');
    try {
      const res = await fetch('/api/chat/topics', {
        headers: { 'Authorization': `Bearer ${Auth.getToken()}` }
      }).then(r => r.json());

      if (res.status === 'success' && res.data.topics) {
        grid.innerHTML = '';
        res.data.topics.forEach(({ label, question }) => {
          const chip = document.createElement('div');
          chip.className = 'topic-chip';
          chip.innerHTML = `
            <span class="chip-icon">${getIcon(label)}</span>
            <span class="chip-label">${label}</span>`;
          chip.addEventListener('click', () => ask(question));
          grid.appendChild(chip);
        });
      }
    } catch (e) {
      // Fallback — hide chips silently if API fails
      grid.innerHTML = '';
    }
  }

  // ── Welcome message ───────────────────────────────────────
  window.addEventListener('load', () => {
    loadTopics();
    appendMessage('bot',
      `Hello! I'm PhishGuard's security assistant.\n\n` +
      `I can answer questions about:\n` +
      `• Phishing attacks and how they work\n` +
      `• How to spot suspicious emails\n` +
      `• What to do if you clicked a bad link\n` +
      `• Password security and 2FA\n` +
      `• SMS and phone scams\n\n` +
      `Click a topic above or type your question below.`
    );
  });
</script>
</body>
</html>
