<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard — Dashboard</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="topbar-logo" href="/dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Phish<span>Guard</span>
  </a>
  <div class="topbar-status">
    <div class="status-dot"></div>
    <span id="model-status">LOADING...</span>
  </div>
  <div class="topbar-right">
    <span class="alert-badge hidden" id="alert-count">0</span>
    <span class="user-badge">Signed in as <b id="topbar-username">—</b></span>
    <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="nav-section">
    <div class="nav-label">Main</div>
    <a class="nav-item" data-page="dashboard" href="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a class="nav-item" data-page="analyzer" href="/detect">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Detect Email
    </a>
    <a class="nav-item" data-page="chatbot" href="/chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Security Chat
    </a>
  </div>
  <div class="nav-section admin-only hidden">
    <div class="nav-label">Admin</div>
    <a class="nav-item" data-page="admin_alerts" href="/alerts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Alerts
    </a>
    <a class="nav-item" data-page="quarantine" href="/quarantine">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Quarantine
    </a>
    <a class="nav-item" data-page="admin_users" href="/users">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Users
    </a>
    <a class="nav-item" data-page="reports" href="/reports">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Reports
    </a>
    <a class="nav-item" data-page="history" href="/history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      Scan History
    </a>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-header">
    <h2>Dashboard</h2>
    <p id="dash-time" class="text-mono text-sm text-dim"></p>
  </div>

  <div class="stats-grid stagger">
    <div class="stat-card accent">
      <div class="stat-label">Total Scans</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">emails analysed</div>
    </div>
    <div class="stat-card danger">
      <div class="stat-label">Phishing</div>
      <div class="stat-value" id="stat-phishing">—</div>
      <div class="stat-sub" id="stat-rate">—</div>
    </div>
    <div class="stat-card safe">
      <div class="stat-label">Safe</div>
      <div class="stat-value" id="stat-safe">—</div>
      <div class="stat-sub">passed clean</div>
    </div>
    <div class="stat-card warn">
      <div class="stat-label">Pending Alerts</div>
      <div class="stat-value" id="stat-alerts">—</div>
      <div class="stat-sub" id="stat-critical">—</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Recent Scans</span>
        <button class="btn btn-ghost btn-sm" onclick="loadDashboard()">Refresh</button>
      </div>
      <div id="recent-scans"><div class="loading"><div class="spinner"></div>Loading...</div></div>
    </div>

    <div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Detection Split</span></div>
        <div class="panel-body">
          <div class="chart-wrap"><canvas id="chart-donut"></canvas></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Active Alerts</span></div>
        <div id="recent-alerts"><div class="loading"><div class="spinner"></div>Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/dashboard.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error('redirect');
</script>
</body>
</html>
