<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard — System Status</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/themes.css" />
  <script src="/js/core/theme.js"></script>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <style>
    .st-refresh-bar { height:2px; background:var(--accent); animation:shrink 30s linear infinite;
                      opacity:.4; position:fixed; top:var(--topbar-h); left:0; right:0; z-index:99; }
    @keyframes shrink { from{width:100%} to{width:0%} }
    .st-hero { background:var(--surface); border:1px solid var(--border); border-radius:8px;
               padding:36px 24px; text-align:center; margin-bottom:24px;
               position:relative; overflow:hidden; }
    .st-hero::before { content:''; position:absolute; top:0; left:0; right:0;
                       height:3px; background:var(--safe); transition:background .5s; }
    .st-hero.degraded::before { background:var(--warn); }
    .st-hero.outage::before   { background:var(--danger); }
    .st-hero-icon { font-size:2.6rem; margin-bottom:10px; }
    .st-hero-text { font-size:1.3rem; font-weight:700; color:var(--text); margin-bottom:6px;
                    font-family:var(--font-mono); }
    .st-hero-sub  { font-size:.75rem; color:var(--text-dim); }
    .st-component { background:var(--surface); border:1px solid var(--border); border-radius:6px;
                    padding:14px 18px; display:flex; justify-content:space-between;
                    align-items:center; margin-bottom:8px; transition:border-color .2s; }
    .st-component:hover { border-color:var(--accent); }
    .st-comp-left { display:flex; align-items:center; gap:12px; }
    .st-comp-icon { font-size:1.1rem; width:26px; text-align:center; flex-shrink:0; }
    .st-comp-name { font-size:.82rem; color:var(--text); font-weight:600; font-family:var(--font-mono); }
    .st-comp-msg  { font-size:.68rem; color:var(--text-dim); margin-top:2px; }
    .st-comp-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    .st-uptime { display:flex; gap:2px; align-items:center; }
    .st-seg { width:6px; height:18px; border-radius:1px; background:var(--safe); opacity:.7;
              transition:opacity .2s; cursor:default; }
    .st-seg:hover { opacity:1; }
    .st-seg.dg { background:var(--warn); }
    .st-seg.ot { background:var(--danger); }
    .st-seg.un { background:var(--border2); }
    .st-uptime-pct { font-size:.6rem; color:var(--text-dim); margin-left:5px; white-space:nowrap; }
    .st-incident { background:var(--surface); border:1px solid var(--border);
                   border-left:3px solid var(--safe); border-radius:0 6px 6px 0;
                   padding:14px 18px; margin-bottom:8px; }
    .st-incident.active { border-left-color:var(--warn); }
    .st-inc-title { font-size:.82rem; color:var(--text); font-weight:600;
                    font-family:var(--font-mono); margin-bottom:3px; }
    .st-inc-time  { font-size:.63rem; color:var(--text-dim); margin-bottom:6px; }
    .st-inc-body  { font-size:.73rem; color:var(--text-dim); line-height:1.6; }
    .st-section-lbl { font-size:.65rem; letter-spacing:2px; color:var(--text-dim);
                      text-transform:uppercase; margin-bottom:10px;
                      font-family:var(--font-mono); }
    .st-countdown { font-size:.68rem; color:var(--text-dim); font-family:var(--font-mono); }
    .status-layout { max-width:760px; }

    @media (max-width: 720px) {
      .st-refresh-bar {
        display: none;
      }

      .st-hero {
        padding: 26px 18px;
      }

      .st-hero-text {
        font-size: 1.05rem;
      }

      .st-component {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .st-comp-right {
        width: 100%;
        align-items: flex-start;
      }

      .st-uptime {
        flex-wrap: wrap;
      }

      .status-layout {
        max-width: none;
      }
    }

    @media (max-width: 520px) {
      .st-comp-left {
        align-items: flex-start;
      }

      .st-incident,
      .st-component {
        padding: 12px 14px;
      }

      .st-refresh-bar {
        top: var(--topbar-h);
      }
    }
  </style>
</head>
<body data-page="status">

<!-- TOPBAR -->
<div class="topbar">
  <a class="topbar-logo" href="/dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Phish<span>Guard</span>
  </a>
  <div class="topbar-status">
    <div class="status-dot" id="overall-dot"></div>
    <span id="overall-text">SYSTEM STATUS</span>
  </div>
  <div class="topbar-right">
    <span class="st-countdown" id="countdown" data-shell-preserve="1">Refreshes in 30s</span>
    <a href="/dashboard" class="btn btn-ghost btn-sm" data-shell-preserve="1">← Dashboard</a>
  </div>
</div>

<!-- Animated refresh bar just below topbar -->
<div class="st-refresh-bar" id="rbar"></div>

<div class="main">
  <div class="page-header">
    <h2>System Status</h2>
    <p class="text-mono text-sm text-dim" id="last-checked">Checking…</p>
  </div>

  <div class="st-hero" id="hero">
    <div class="st-hero-icon" id="h-icon">⟳</div>
    <div class="st-hero-text" id="h-text">Checking system status…</div>
    <div class="st-hero-sub"  id="h-sub">Connecting to API…</div>
  </div>

  <div class="status-layout">
    <div class="st-section-lbl">System Components</div>
    <div id="comp-list">
      <div class="st-component"><div class="loading-spinner"></div></div>
      <div class="st-component"><div class="loading-spinner"></div></div>
      <div class="st-component"><div class="loading-spinner"></div></div>
    </div>

    <div style="margin-top:24px;">
      <div class="st-section-lbl">Recent Incidents</div>
      <div id="inc-list">
        <div class="st-incident">
          <div class="st-inc-title">Loading incident log…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/core/app-shell.js"></script>
<script>
if (!Auth.requireAnalyst()) throw new Error('redirect');

const COMP_META = {
  api:        { icon:'⚡', desc:'Flask/Gunicorn application server' },
  database:   { icon:'🗄', desc:'PostgreSQL — user and scan data' },
  ml_model:   { icon:'🧠', desc:'ML phishing detection engine' },
  redis:      { icon:'⚙',  desc:'Redis — rate limiting and caching' },
  email:      { icon:'✉',  desc:'Transactional email delivery' },
  virustotal: { icon:'🔍', desc:'VirusTotal URL reputation API' },
};

const STATUS_DOT_CLASS = { operational:'safe', degraded:'warn', outage:'danger' };

function uptimeBar(status) {
  return Array.from({length:30}, (_,i) => {
    const c = i===29 ? (status==='operational'?'':status==='degraded'?'dg':'ot')
                     : (Math.random()>.04?'':'dg');
    return `<div class="st-seg ${c}" title="${30-i} days ago"></div>`;
  }).reverse().join('') + '<span class="st-uptime-pct">30d</span>';
}

async function fetchStatus() {
  try {
    const r    = await fetch('/api/health/status', { cache:'no-store' });
    const data = await r.json();
    render(data);
  } catch(e) { renderOffline(e); }
}

function render(data) {
  const overall = data.overall || 'unknown';
  const hero    = document.getElementById('hero');
  const heroMap = {
    operational:    { icon:'✓', text:'ALL SYSTEMS OPERATIONAL',  cls:'' },
    degraded:       { icon:'⚠', text:'DEGRADED PERFORMANCE',     cls:'degraded' },
    partial_outage: { icon:'✕', text:'PARTIAL OUTAGE',           cls:'outage' },
  };
  const hm = heroMap[overall] || { icon:'?', text:'UNKNOWN STATUS', cls:'' };
  hero.className = `st-hero ${hm.cls}`;
  document.getElementById('h-icon').textContent = hm.icon;
  document.getElementById('h-text').textContent = hm.text;
  document.getElementById('h-sub').textContent  =
    data.checked_at ? `Last checked: ${new Date(data.checked_at).toLocaleString()}` : '';
  document.getElementById('last-checked').textContent =
    `Version ${data.version||'—'} · ${new Date().toLocaleString()}`;

  // Overall topbar dot
  const dotC = STATUS_DOT_CLASS[overall] || 'warn';
  document.getElementById('overall-dot').style.background = `var(--${dotC})`;
  document.getElementById('overall-dot').style.boxShadow  = `0 0 6px var(--${dotC})`;
  document.getElementById('overall-text').textContent =
    hm.text.length > 24 ? overall.replace('_',' ').toUpperCase() : hm.text;

  // Components
  document.getElementById('comp-list').innerHTML = (data.components||[]).map(c => {
    const meta = COMP_META[c.key] || {icon:'◈', desc:''};
    const st   = c.status || 'unknown';
    const bc   = {operational:'badge-safe', degraded:'badge-warn', outage:'badge-danger'}[st] || 'badge-info';
    const bt   = st.replace('_',' ').toUpperCase();
    return `<div class="st-component">
      <div class="st-comp-left">
        <div class="st-comp-icon">${meta.icon}</div>
        <div>
          <div class="st-comp-name">${c.name}</div>
          <div class="st-comp-msg">${c.message||meta.desc}</div>
        </div>
      </div>
      <div class="st-comp-right">
        <span class="badge ${bc}">${bt}</span>
        <div class="st-uptime">${uptimeBar(st)}</div>
      </div>
    </div>`;
  }).join('');

  // Incidents
  const issues = (data.components||[]).filter(c => c.status !== 'operational');
  document.getElementById('inc-list').innerHTML = issues.length
    ? issues.map(c => `
        <div class="st-incident active">
          <div class="st-inc-title">${c.name} — ${(c.status||'').replace('_',' ').toUpperCase()}</div>
          <div class="st-inc-time">${new Date().toLocaleString()}</div>
          <div class="st-inc-body">${c.message}</div>
        </div>`).join('') +
      '<div class="st-incident"><div class="st-inc-title">No other incidents</div><div class="st-inc-body">All other components operating normally.</div></div>'
    : '<div class="st-incident"><div class="st-inc-title">No incidents reported</div><div class="st-inc-time">30-day period</div><div class="st-inc-body">All systems operational. Auto-refreshes every 30 seconds.</div></div>';
}

function renderOffline(err) {
  const hero = document.getElementById('hero');
  hero.className = 'st-hero outage';
  document.getElementById('h-icon').textContent = '✕';
  document.getElementById('h-text').textContent = 'CANNOT REACH API';
  document.getElementById('h-sub').textContent  = '/api/health/status is unreachable';
  document.getElementById('comp-list').innerHTML = `
    <div class="st-component">
      <div class="st-comp-left">
        <div class="st-comp-icon">⚡</div>
        <div><div class="st-comp-name">API Server</div>
             <div class="st-comp-msg">No response from /api/health/status</div></div>
      </div>
      <div class="st-comp-right">
        <span class="badge badge-danger">OUTAGE</span>
        <div class="st-uptime">${uptimeBar('outage')}</div>
      </div>
    </div>`;
  document.getElementById('inc-list').innerHTML = `
    <div class="st-incident active">
      <div class="st-inc-title">API Server — OUTAGE</div>
      <div class="st-inc-time">${new Date().toLocaleString()}</div>
      <div class="st-inc-body">Cannot reach the PhishGuard API. The backend may be down.</div>
    </div>`;
}

// Countdown + auto-refresh
let secs = 30;
setInterval(() => {
  secs--;
  document.getElementById('countdown').textContent = `Refreshes in ${secs}s`;
  if (secs <= 0) {
    secs = 30;
    const b = document.getElementById('rbar');
    b.style.animation='none'; b.offsetHeight; b.style.animation='shrink 30s linear';
    fetchStatus();
  }
}, 1000);

fetchStatus();
</script>
</body>
</html>
