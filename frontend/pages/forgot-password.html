<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard AI — Forgot Password</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>
<body>
<div class="login-page">
  <div class="login-box fade-in">

    <div class="login-logo">
      <span class="logo-icon">🛡</span>
      <span class="logo-text">PhishGuard <span class="logo-ai">AI</span></span>
    </div>
    <p class="login-subtitle">Password Recovery</p>

    <!-- Success state (hidden until email sent) -->
    <div id="success-state" style="display:none; text-align:center; padding: 1rem 0;">
      <div style="font-size:2.5rem; margin-bottom:1rem;">📬</div>
      <p style="color: var(--accent); font-weight:600; margin-bottom:.5rem;">Check your inbox</p>
      <p style="color: var(--text-dim); font-size:.9rem;">
        If that email is registered, a reset link has been sent.<br>
        The link expires in <strong>1 hour</strong>.
      </p>
      <a href="/login" class="btn btn-primary btn-full mt-1" style="display:block; margin-top:1.5rem;">
        Back to Login
      </a>
    </div>

    <!-- Form state -->
    <div id="form-state">
      <p style="color: var(--text-dim); font-size:.9rem; margin-bottom:1.5rem;">
        Enter your account email address and we'll send you a link to reset your password.
      </p>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reset-email" placeholder="you@company.com"
               onkeydown="if(event.key==='Enter') doForgotPassword()" />
      </div>

      <div class="form-error" id="forgot-error"></div>

      <button class="btn btn-primary btn-full mt-1" onclick="doForgotPassword()" id="submit-btn">
        Send Reset Link
      </button>

      <p style="text-align:center; margin-top:1.25rem; font-size:.85rem; color:var(--text-dim);">
        Remembered it? <a href="/login" style="color:var(--accent);">Sign in</a>
      </p>
    </div>

  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  const API = 'http://localhost:5000';

  async function doForgotPassword() {
    const email   = document.getElementById('reset-email').value.trim();
    const errEl   = document.getElementById('forgot-error');
    const btn     = document.getElementById('submit-btn');

    errEl.textContent = '';

    if (!email) {
      errEl.textContent = 'Please enter your email address.';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Sending…';

    try {
      const res  = await fetch(`${API}/api/auth/forgot-password`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });

      // Always show success — server never reveals if email exists
      document.getElementById('form-state').style.display    = 'none';
      document.getElementById('success-state').style.display = 'block';

    } catch (err) {
      errEl.textContent  = 'Network error. Please try again.';
      btn.disabled       = false;
      btn.textContent    = 'Send Reset Link';
    }
  }
</script>
</body>
</html>
