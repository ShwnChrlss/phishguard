<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard AI — Login</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/themes.css" />
  <script src="/js/core/theme.js"></script>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <style>
    /* ── Tab switcher ───────────────────────────────────────── */
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .auth-tab {
      flex: 1;
      padding: .6rem 1rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
    }
    .auth-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    /* ── Role selector ──────────────────────────────────────── */
    .role-note {
      font-size: .72rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-top: .25rem;
    }

    /* ── Error / info messages ──────────────────────────────── */
    .form-error {
      color: var(--danger);
      font-size: .78rem;
      font-family: var(--font-mono);
      margin-top: .5rem;
      min-height: 1.1rem;
    }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-box fade-in">

    <!-- Logo -->
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
        <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Phish<span>Guard</span> AI</h1>
    </div>
    <p class="login-subtitle">Security Intelligence Platform</p>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- ── LOGIN PANEL ─────────────────────────────────────── -->
    <div id="panel-login" class="auth-panel active">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="admin"
               autocomplete="username"
               onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <div class="form-error" id="login-error"></div>
      <button class="btn btn-primary btn-full mt-1" onclick="doLogin()">
        Authenticate →
      </button>
      <p style="text-align:center; margin-top:1rem; font-size:.85rem; color:var(--text-dim);">
        <a href="/forgot-password" style="color:var(--accent);">Forgot your password?</a>
      </p>
    </div>

    <!-- ── REGISTER PANEL ──────────────────────────────────── -->
    <div id="panel-register" class="auth-panel">

      <!--
        CONCEPT: Role assignment on registration
        Regular users self-register with role = "user".
        Admins are created by existing admins via /users page.
        The role field here is hidden — always "user".
        This prevents anyone from self-promoting to admin.
      -->

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="john_doe"
               autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@company.com"
               autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 8 characters"
               autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Repeat password"
               autocomplete="new-password"
               onkeydown="if(event.key==='Enter') doRegister()" />
      </div>
      <div class="form-group">
        <label>Department <span class="text-dim">(optional)</span></label>
        <input type="text" id="reg-dept" placeholder="e.g. Finance, IT, HR" />
      </div>

      <p class="role-note">
        ⓘ New accounts start with <strong>User</strong> access.
        An admin can upgrade your role after sign-up.
      </p>

      <div class="form-error" id="reg-error"></div>
      <button class="btn btn-primary btn-full mt-1" onclick="doRegister()">
        Create Account →
      </button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script>
  // Already logged in — skip to dashboard
  if (Auth.isLoggedIn()) window.location.href = '/dashboard';

  // ── Tab switching ──────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    // Clear errors on switch
    document.getElementById('login-error').textContent = '';
    document.getElementById('reg-error').textContent   = '';
  }

  // ── Login ──────────────────────────────────────────────────
  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');

    errEl.textContent = '';

    if (!username || !password) {
      errEl.textContent = 'Username and password are required.';
      return;
    }

    const btn = document.querySelector('#panel-login .btn');
    btn.textContent = 'Authenticating…';
    btn.disabled = true;

    const result = await Auth.login(username, password);

    if (result.ok) {
      window.location.href = '/dashboard';
    } else {
      errEl.textContent = result.message || 'Login failed.';
      btn.textContent = 'Authenticate →';
      btn.disabled = false;
    }
  }

  // ── Register ───────────────────────────────────────────────
  async function doRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const dept     = document.getElementById('reg-dept').value.trim();
    const errEl    = document.getElementById('reg-error');

    errEl.textContent = '';

    // Client-side validation
    if (!username || !email || !password) {
      errEl.textContent = 'Username, email and password are required.';
      return;
    }
    if (username.length < 3) {
      errEl.textContent = 'Username must be at least 3 characters.';
      return;
    }
    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      return;
    }
    if (!email.includes('@')) {
      errEl.textContent = 'Please enter a valid email address.';
      return;
    }

    const btn = document.querySelector('#panel-register .btn');
    btn.textContent = 'Creating account…';
    btn.disabled = true;

    // Role is always "user" — never trust client to set this
    const result = await Auth.register(username, email, password, dept || undefined);

    if (result.ok) {
      window.location.href = '/dashboard';
    } else {
      errEl.textContent = result.message || 'Registration failed.';
      btn.textContent = 'Create Account →';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
