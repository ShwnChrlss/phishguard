<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard AI — Reset Password</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>
<body>
<div class="login-page">
  <div class="login-box fade-in">

    <div class="login-logo">
      <span class="logo-icon">🛡</span>
      <span class="logo-text">PhishGuard <span class="logo-ai">AI</span></span>
    </div>
    <p class="login-subtitle">Set New Password</p>

    <!-- Invalid token state -->
    <div id="invalid-state" style="display:none; text-align:center; padding:1rem 0;">
      <div style="font-size:2.5rem; margin-bottom:1rem;">⛔</div>
      <p style="color: var(--danger, #ff4d4d); font-weight:600; margin-bottom:.5rem;">Invalid or Expired Link</p>
      <p style="color: var(--text-dim); font-size:.9rem;">
        This reset link is invalid, expired, or has already been used.
      </p>
      <a href="/forgot-password" class="btn btn-primary btn-full mt-1" style="display:block; margin-top:1.5rem;">
        Request New Link
      </a>
    </div>

    <!-- Success state -->
    <div id="success-state" style="display:none; text-align:center; padding:1rem 0;">
      <div style="font-size:2.5rem; margin-bottom:1rem;">✅</div>
      <p style="color: var(--accent); font-weight:600; margin-bottom:.5rem;">Password Updated</p>
      <p style="color: var(--text-dim); font-size:.9rem;">
        Your password has been changed successfully.
      </p>
      <a href="/login" class="btn btn-primary btn-full mt-1" style="display:block; margin-top:1.5rem;">
        Sign In
      </a>
    </div>

    <!-- Form state -->
    <div id="form-state">
      <p style="color: var(--text-dim); font-size:.9rem; margin-bottom:1.5rem;">
        Enter your new password below. Must be at least 8 characters.
      </p>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat password"
               onkeydown="if(event.key==='Enter') doResetPassword()" />
      </div>

      <div class="form-error" id="reset-error"></div>

      <button class="btn btn-primary btn-full mt-1" onclick="doResetPassword()" id="submit-btn">
        Update Password
      </button>

      <p style="text-align:center; margin-top:1.25rem; font-size:.85rem; color:var(--text-dim);">
        <a href="/login" style="color:var(--accent);">Back to Login</a>
      </p>
    </div>

  </div>
</div>

<script src="/js/utils.js"></script>
<script>
  const API = 'http://localhost:5000';

  // Read token from URL: /reset-password?token=abc123
  const params = new URLSearchParams(window.location.search);
  const TOKEN  = params.get('token');

  // If no token in URL, show invalid state immediately
  if (!TOKEN) {
    document.getElementById('form-state').style.display    = 'none';
    document.getElementById('invalid-state').style.display = 'block';
  }

  async function doResetPassword() {
    const password = document.getElementById('new-password').value;
    const confirm  = document.getElementById('confirm-password').value;
    const errEl    = document.getElementById('reset-error');
    const btn      = document.getElementById('submit-btn');

    errEl.textContent = '';

    if (!password || !confirm) {
      errEl.textContent = 'Please fill in both fields.';
      return;
    }

    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      return;
    }

    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Updating…';

    try {
      const res  = await fetch(`${API}/api/auth/reset-password`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token: TOKEN, password }),
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById('form-state').style.display    = 'none';
        document.getElementById('success-state').style.display = 'block';
      } else {
        // Token invalid, expired, or already used
        const msg = data?.error || data?.message || 'Invalid or expired reset link.';
        errEl.textContent = msg;

        // If server says invalid/expired, switch to invalid state
        if (res.status === 400) {
          setTimeout(() => {
            document.getElementById('form-state').style.display    = 'none';
            document.getElementById('invalid-state').style.display = 'block';
          }, 1500);
        }

        btn.disabled    = false;
        btn.textContent = 'Update Password';
      }

    } catch (err) {
      errEl.textContent  = 'Network error. Please try again.';
      btn.disabled       = false;
      btn.textContent    = 'Update Password';
    }
  }
</script>
</body>
</html>
