# ─────────────────────────────────────────────────────────────
# PhishGuard AI — Nginx Configuration
#
# WHAT NGINX DOES HERE:
#   1. Serves frontend static files directly (CSS, JS, images)
#      WITHOUT involving Flask — much faster
#   2. Proxies API requests to Gunicorn (Flask)
#   3. Proxies page requests to Gunicorn (Flask routes)
#   4. Adds security headers to every response
#   5. In production: handles SSL termination
#
# WHY A REVERSE PROXY?
#   Gunicorn is good at running Python but bad at:
#   - Serving static files efficiently
#   - Handling slow clients (attackers can DoS Gunicorn)
#   - SSL termination
#   - Compression
#   Nginx handles all of this, passing only dynamic
#   requests to Gunicorn.
# ─────────────────────────────────────────────────────────────

events {
    worker_connections 1024;  # max simultaneous connections
}

http {
    # MIME types — tells browsers what kind of file they're getting
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Performance
    sendfile on;           # efficient file serving (OS kernel handles it)
    keepalive_timeout 65;  # keep connections alive for 65s

    # Upstream — defines where Flask/Gunicorn is running
    # 'app' resolves to the app container via Docker DNS
    upstream flask_app {
        server app:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── SECURITY HEADERS ──────────────────────────────────
        # These protect users from common web attacks
        add_header X-Frame-Options "SAMEORIGIN";           # clickjacking
        add_header X-Content-Type-Options "nosniff";       # MIME sniffing
        add_header X-XSS-Protection "1; mode=block";       # XSS filter
        add_header Referrer-Policy "strict-origin";        # referrer leakage
        add_header Permissions-Policy "geolocation=()";    # browser features

        # ── STATIC FILES ──────────────────────────────────────
        # Nginx serves CSS, JS, images directly — no Flask involved
        # 'expires 1d' tells browsers to cache for 1 day
        location /css/ {
            root /var/www/html;
            expires 1d;
        }
        location /js/ {
            root /var/www/html;
            expires 1d;
        }
        location /images/ {
            root /var/www/html;
            expires 7d;
        }

        # ── API REQUESTS ──────────────────────────────────────
        # Forward /api/* to Flask
        location /api/ {
            proxy_pass http://flask_app;

            # Pass client info to Flask so it knows the real IP
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts — important for ML scans that take time
            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
        }

        # ── ALL OTHER REQUESTS → FLASK ────────────────────────
        # Page routes (/dashboard, /history, etc.)
        # Serve HTML pages directly from frontend folder.
        # try_files checks: exact file → exact dir → fallback to Flask.
        # This means login.html, index.html etc. are served by nginx,
        # while /api/* routes are proxied to Flask (handled above).
        location = / {
            return 302 /pages/login.html;
        }

        location = /login      { return 302 /pages/login.html; }
        location = /dashboard   { return 302 /pages/dashboard.html; }
        location = /detect      { return 302 /pages/analyzer.html; }
        location = /chat        { return 302 /pages/chatbot.html; }
        location = /alerts      { return 302 /pages/admin_alerts.html; }
        location = /quarantine  { return 302 /pages/quarantine.html; }
        location = /users       { return 302 /pages/admin_users.html; }
        location = /reports     { return 302 /pages/reports.html; }
        location = /history     { return 302 /pages/history.html; }

        location / {
            root /var/www/html;
            index login.html;
            try_files $uri $uri/ @flask;
        }

        # Named location — fallback proxy to Flask for everything
        # that isn't a static file (e.g. /api routes not matched above).
        location @flask {
            proxy_pass http://flask_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
